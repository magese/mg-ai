server:
  port: 15977

spring:
  application:
    name: mcp-agent
  profiles:
    active: dev
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 1.1
    chat:
      observations:
        log-completion: true
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}

logging:
  level:
    root: info
