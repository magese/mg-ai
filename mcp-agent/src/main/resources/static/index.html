<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>俛俛姐姐</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
<div class="header">
  <div class="logo">俛俛姐姐</div>
  <button class="clear-button" id="clearButton">清空对话</button>
</div>

<div class="chat-container" id="chatContainer">
  <div class="welcome-message">
    Hello！我是俛俛姐姐，你好吗？
  </div>
</div>
<div class="input-area">
  <input type="text" class="input-field" id="messageInput" placeholder="输入您的消息..." autocomplete="off">
  <button class="send-button" id="sendButton">发送</button>
</div>

<script src="index.js"></script>
</body>
</html>
